<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Rabbit body -->
  <ellipse cx="100" cy="140" rx="40" ry="35" fill="#F5F5F5"/>
  <!-- Head -->
  <circle cx="100" cy="85" r="35" fill="#F5F5F5"/>
  <!-- Ears -->
  <ellipse cx="75" cy="30" rx="12" ry="35" fill="#F5F5F5"/>
  <ellipse cx="125" cy="30" rx="12" ry="35" fill="#F5F5F5"/>
  <ellipse cx="75" cy="30" rx="6" ry="28" fill="#FFB6C1"/>
  <ellipse cx="125" cy="30" rx="6" ry="28" fill="#FFB6C1"/>
  <!-- Eyes -->
  <circle cx="85" cy="80" r="8" fill="#2C2C2C"/>
  <circle cx="115" cy="80" r="8" fill="#2C2C2C"/>
  <circle cx="87" cy="78" r="3" fill="white"/>
  <circle cx="117" cy="78" r="3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="92" rx="5" ry="4" fill="#FFB6C1"/>
  <!-- Mouth -->
  <path d="M 93 98 L 100 105 L 107 98" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
  <!-- Whiskers -->
  <line x1="60" y1="90" x2="40" y2="85" stroke="#CCC" stroke-width="1"/>
  <line x1="60" y1="95" x2="40" y2="97" stroke="#CCC" stroke-width="1"/>
  <line x1="140" y1="90" x2="160" y2="85" stroke="#CCC" stroke-width="1"/>
  <line x1="140" y1="95" x2="160" y2="97" stroke="#CCC" stroke-width="1"/>
  <!-- Fluffy tail -->
  <circle cx="140" cy="145" r="12" fill="#F5F5F5"/>
  <!-- Feet -->
  <ellipse cx="80" cy="172" rx="12" ry="8" fill="#F5F5F5"/>
  <ellipse cx="120" cy="172" rx="12" ry="8" fill="#F5F5F5"/>
  <!-- Carrot -->
  <polygon points="55,160 45,185 65,185" fill="#FF6B00"/>
  <rect x="50" y="155" width="10" height="8" fill="#32CD32"/>
</svg>