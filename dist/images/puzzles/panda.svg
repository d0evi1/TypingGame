<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Panda body -->
  <ellipse cx="100" cy="140" rx="50" ry="40" fill="white"/>
  <!-- Head -->
  <circle cx="100" cy="70" r="45" fill="white"/>
  <!-- Ears -->
  <circle cx="60" cy="35" r="18" fill="#2C2C2C"/>
  <circle cx="140" cy="35" r="18" fill="#2C2C2C"/>
  <!-- Eye patches -->
  <ellipse cx="75" cy="65" rx="18" ry="15" fill="#2C2C2C"/>
  <ellipse cx="125" cy="65" rx="18" ry="15" fill="#2C2C2C"/>
  <!-- Eyes -->
  <circle cx="75" cy="65" r="6" fill="white"/>
  <circle cx="125" cy="65" r="6" fill="white"/>
  <circle cx="77" cy="67" r="4" fill="#2C2C2C"/>
  <circle cx="127" cy="67" r="4" fill="#2C2C2C"/>
  <!-- Nose -->
  <ellipse cx="100" cy="85" rx="8" ry="5" fill="#2C2C2C"/>
  <!-- Mouth -->
  <path d="M 90 92 Q 100 100 110 92" stroke="#2C2C2C" stroke-width="2" fill="none"/>
  <!-- Bamboo -->
  <rect x="155" y="100" width="8" height="80" fill="#32CD32" rx="4"/>
  <rect x="155" y="120" width="8" height="2" fill="#228B22"/>
  <rect x="155" y="140" width="8" height="2" fill="#228B22"/>
  <ellipse cx="163" cy="100" rx="15" ry="8" fill="#32CD32"/>
  <!-- Arms -->
  <ellipse cx="60" cy="130" rx="15" ry="25" fill="#2C2C2C"/>
  <ellipse cx="140" cy="130" rx="15" ry="25" fill="#2C2C2C"/>
  <!-- Legs -->
  <ellipse cx="75" cy="175" rx="18" ry="15" fill="#2C2C2C"/>
  <ellipse cx="125" cy="175" rx="18" ry="15" fill="#2C2C2C"/>
</svg>