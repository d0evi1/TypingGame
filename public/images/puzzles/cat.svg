<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cat body -->
  <ellipse cx="100" cy="120" rx="60" ry="50" fill="#F4A460"/>
  <!-- Head -->
  <circle cx="100" cy="70" r="40" fill="#F4A460"/>
  <!-- Ears -->
  <polygon points="65,40 55,10 80,35" fill="#F4A460"/>
  <polygon points="135,40 145,10 120,35" fill="#F4A460"/>
  <polygon points="70,35 62,15 82,35" fill="#FFB6C1"/>
  <polygon points="130,35 138,15 118,35" fill="#FFB6C1"/>
  <!-- Eyes -->
  <ellipse cx="80" cy="65" rx="8" ry="10" fill="white"/>
  <ellipse cx="120" cy="65" rx="8" ry="10" fill="white"/>
  <circle cx="80" cy="67" r="5" fill="#2C2C2C"/>
  <circle cx="120" cy="67" r="5" fill="#2C2C2C"/>
  <!-- Nose -->
  <polygon points="100,80 95,88 105,88" fill="#FFB6C1"/>
  <!-- Mouth -->
  <path d="M 90 92 Q 100 100 110 92" stroke="#2C2C2C" stroke-width="2" fill="none"/>
  <!-- Whiskers -->
  <line x1="55" y1="75" x2="30" y2="70" stroke="#2C2C2C" stroke-width="1.5"/>
  <line x1="55" y1="80" x2="30" y2="82" stroke="#2C2C2C" stroke-width="1.5"/>
  <line x1="145" y1="75" x2="170" y2="70" stroke="#2C2C2C" stroke-width="1.5"/>
  <line x1="145" y1="80" x2="170" y2="82" stroke="#2C2C2C" stroke-width="1.5"/>
  <!-- Tail -->
  <path d="M 160 120 Q 180 90 170 130" stroke="#F4A460" stroke-width="15" fill="none" stroke-linecap="round"/>
</svg>