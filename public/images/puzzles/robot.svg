<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Robot head -->
  <rect x="50" y="40" width="100" height="80" rx="10" fill="#4A90D9"/>
  <!-- Antenna -->
  <line x1="100" y1="40" x2="100" y2="20" stroke="#333" stroke-width="4"/>
  <circle cx="100" cy="15" r="8" fill="#FF4444"/>
  <!-- Eyes -->
  <circle cx="75" cy="70" r="15" fill="#1a1a2e"/>
  <circle cx="125" cy="70" r="15" fill="#1a1a2e"/>
  <circle cx="75" cy="70" r="8" fill="#00FF00"/>
  <circle cx="125" cy="70" r="8" fill="#00FF00"/>
  <!-- Mouth -->
  <rect x="70" y="95" width="60" height="15" rx="5" fill="#333"/>
  <rect x="75" y="98" width="10" height="8" fill="#FFD700"/>
  <rect x="90" y="98" width="10" height="8" fill="#FFD700"/>
  <rect x="105" y="98" width="10" height="8" fill="#FFD700"/>
  <!-- Body -->
  <rect x="60" y="125" width="80" height="60" rx="8" fill="#4A90D9"/>
  <!-- Controls -->
  <circle cx="80" cy="150" r="8" fill="#FF4444"/>
  <circle cx="100" cy="150" r="8" fill="#44FF44"/>
  <circle cx="120" cy="150" r="8" fill="#4444FF"/>
  <!-- Arms -->
  <rect x="30" y="130" width="25" height="12" rx="4" fill="#333"/>
  <rect x="145" y="130" width="25" height="12" rx="4" fill="#333"/>
  <!-- Legs -->
  <rect x="70" y="185" width="15" height="10" rx="3" fill="#333"/>
  <rect x="115" y="185" width="15" height="10" rx="3" fill="#333"/>
</svg>